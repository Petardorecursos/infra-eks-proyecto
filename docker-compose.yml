version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Innovatech2026!
      MYSQL_DATABASE: innovatech_db
    ports:
      - "3306:3306"
    networks:
      - app-network

  back-ventas:
    image: 572798954903.dkr.ecr.us-east-1.amazonaws.com/back-ventas:latest
    container_name: back-ventas
    depends_on:
      - mysql-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/innovatech_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Innovatech2026!
    ports:
      - "8081:8080"
    networks:
      - app-network

  back-despachos:
    image: 572798954903.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
    container_name: back-despachos
    depends_on:
      - mysql-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/innovatech_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Innovatech2026!
    ports:
      - "8082:8080"
    networks:
      - app-network

  front-despacho:
    image: 572798954903.dkr.ecr.us-east-1.amazonaws.com/front-despacho:latest
    container_name: front-despacho
    ports:
      - "80:80"
    depends_on:
      - back-ventas
      - back-despachos
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
