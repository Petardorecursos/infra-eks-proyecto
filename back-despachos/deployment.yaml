apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        # ¡CORRECCIÓN AQUÍ!: ID de cuenta de AWS actualizado a 572798954903
        image: 572798954903.dkr.ecr.us-east-1.amazonaws.com/back-despachos-springboot:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: SERVER_ADDRESS
          value: "0.0.0.0"
        # URL corregida para el servicio interno de MySQL en el clúster
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/innovatech_db?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true"
        # Usuario 'root' por defecto en la imagen de MySQL
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        # Contraseña definida en el deployment de mysql-db
        - name: SPRING_DATASOURCE_PASSWORD
          value: "Innovatech2026!"
