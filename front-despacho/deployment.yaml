apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-despacho
  template:
    metadata:
      labels:
        app: front-despacho
    spec:
      containers:
      - name: front-despacho
        image: 495619789963.dkr.ecr.us-east-1.amazonaws.com/front_despacho:latest
        ports:
        - containerPort: 80
        env:
        # El frontend debe apuntar al Servicio K8s del backend
        # ⚠️ IMPORTANTE: El nombre "API_URL" depende de cómo esté programado tu código.
        # Podría llamarse NEXT_PUBLIC_API_URL, REACT_APP_API_URL, VITE_API_URL, etc.
        - name: API_URL
          value: "http://back-ventas-service:8080" # Reemplaza "back-ventas-service" con el nombre real de tu Service
