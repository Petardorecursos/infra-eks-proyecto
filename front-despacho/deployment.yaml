apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-despacho
  template:
    metadata:
      labels:
        app: front-despacho
    spec:
      containers:
      - name: front-despacho
        image: 495619789963.dkr.ecr.us-east-1.amazonaws.com/front_despacho:latest
        ports:
        - containerPort: 80
        env:
        # Estas variables sobreescriben la configuración interna de Spring Boot
        # para evitar el conflicto con los marcadores ${DB_PORT}
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://innovatech-db.ctfx6aibrdbf.us-east-1.rds.amazonaws.com:3306/innovatech-db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "Innovatech2026!"
